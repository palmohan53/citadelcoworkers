    <!-- ✅ Tidio Language-based Hide Script -->
    <script>
      (function () {
        function handleTidio() {
          if (!window.tidioChatApi) {
            setTimeout(handleTidio, 500);
            return;
          }

          fetch("https://ipapi.co/json/")
            .then(res => res.json())
            .then(data => {
              if (data && data.country_code === "IN") {
                window.tidioChatApi.hide();
              } else {
                window.tidioChatApi.show();
              }
            })
            .catch(() => {
              var lang = navigator.language || "";
              if (lang.startsWith("hi") || lang.startsWith("en-IN")) {
                window.tidioChatApi.hide();
              }
            });
        }

        handleTidio();
      })();
    </script>
